version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: smartfood_postgres
    environment:
      POSTGRES_DB: smartfood_db
      POSTGRES_USER: smartfood
      POSTGRES_PASSWORD: smartfood123
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/main/resources/db/migration:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smartfood"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - smartfood_network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: smartfood_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - smartfood_network

  # Backend Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: smartfood_backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/smartfood_db
      SPRING_DATASOURCE_USERNAME: smartfood
      SPRING_DATASOURCE_PASSWORD: smartfood123
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      JWT_SECRET: smartfood_jwt_secret_key_change_in_production
      JWT_EXPIRATION: 86400000
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - smartfood_network
    restart: unless-stopped

  # Frontend Service
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: smartfood_frontend
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://localhost:8080/api
      REACT_APP_WS_URL: ws://localhost:8080/ws
    depends_on:
      - backend
    networks:
      - smartfood_network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  smartfood_network:
    driver: bridge
